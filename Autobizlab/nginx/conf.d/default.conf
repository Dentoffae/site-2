# Единая точка входа: сайт и API только через Nginx.
# PostgreSQL и backend не публикуют порты наружу — только внутренняя сеть.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker Registry v2 — тот же хост:80, что и сайт (извне: docker login/pull/push без :5000)
    # Образы: docker tag myapp:latest <ваш_хост>/project/myapp:latest && docker push <ваш_хост>/project/myapp:latest
    location /v2/ {
        client_max_body_size 0;
        proxy_pass http://registry:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_connect_timeout 900s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Swagger / OpenAPI FastAPI — для тестирования через тот же Nginx (:80)
    location = /openapi.json {
        proxy_pass http://backend:8080/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://backend:8080/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://backend:8080/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика фронта (лендинг / форма заявки)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — только через Nginx; тело заявки + метрики (POST /api/v1/leads и др.)
    location /api/ {
        client_max_body_size 5m;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # pgAdmin — только через Nginx (не открывайте порт pgadmin наружу)
    location = /pgadmin {
        return 301 /pgadmin/;
    }

    location /pgadmin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header X-Scheme $scheme;
        proxy_pass http://pgadmin:80/;
        proxy_redirect off;
    }
}
